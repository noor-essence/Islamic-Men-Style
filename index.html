<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islamic Mens Wear</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: #0d0d0d;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: black;
      align-items: center;
    }

    header h1 {
      color: gold;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: gold;
    }

    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 50px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    .section {
      padding: 60px 50px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 15px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: black;
      margin-top: 50px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Islamic Mens Wear</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Modesty meets Style</h2>
</section>

<section class="section">
  <h2>Unsere Produkte</h2>

  <div class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
      <h3>Premium Thobe</h3>
      <p>Eleganter islamischer Stil</p>
      <a href="#" class="btn">Jetzt kaufen</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>Streetwear Hoodie</h3>
      <p>Modern & modest</p>
      <a href="#" class="btn">Jetzt kaufen</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
      <h3>Klassischer Jubba</h3>
      <p>Tradition trifft Style</p>
      <a href="#" class="btn">Jetzt kaufen</a>
    </div>
  </div>
</section>

<footer>
  © 2026 Islamic Mens Wear – All rights reserved
</footer>

</body>
</html>
